name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Update version in POM
      run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -B
    
    - name: Build and package
      run: mvn clean package -DskipTests -B
    
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          **/target/mcp-test-api-*.jar
          **/target/mcp-test-interfaces-*.jar
          **/target/mcp-test-core-*.jar
          **/target/mcp-test-transport-*.jar
          **/target/mcp-test-client-*.jar
          **/target/mcp-test-examples-*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
