name: Release to Maven Central

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 and configure Maven credentials + GPG
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          # Use OSSRH credentials (create user token on Sonatype and set secrets)
          # This will populate a <server> entry with id "ossrh" in settings.xml
          server-ids: 'ossrh'
          server-username: ${{ secrets.CENTRAL_USERNAME }}
          server-password: ${{ secrets.CENTRAL_PASSWORD }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Import GPG private key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "Importing GPG private key (masked)..."
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY secret is empty or missing"; exit 1
          fi
          # import the provided ASCII-armored private key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import || true
          # ensure secret keys are available
          gpg --list-secret-keys --keyid-format LONG || true

      - name: Export GPG passphrase to environment for Maven
        run: |
          echo "Exporting GPG_PASSPHRASE to environment (masked)"
          echo "GPG_PASSPHRASE=${{ secrets.GPG_PASSPHRASE }}" >> $GITHUB_ENV

      - name: Enable GPG loopback pinentry (required for non-interactive signing)
        run: |
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          # restart gpg-agent so the new setting takes effect
          gpgconf --kill gpg-agent || true
          sleep 1

      - name: Debug GPG setup
        run: |
          echo "GPG version:"; gpg --version
          echo "List secret keys:"; gpg --list-secret-keys --keyid-format LONG || true
          echo "GPG home:"; gpgconf --list-dirs
          # show that the GPG_PASSPHRASE env is available (masked in logs)
          echo "GPG_PASSPHRASE present:"; if [ -z "$GPG_PASSPHRASE" ]; then echo "(empty)"; else echo "(set)"; fi

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: mvn-repo-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            mvn-repo-${{ runner.os }}-

      - name: Write Maven settings with OSSRH credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.m2
          rm -f ~/.m2/settings.xml
          echo "<settings xmlns=\"http://maven.apache.org/SETTINGS/1.0.0\"" > ~/.m2/settings.xml
          echo "  xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"" >> ~/.m2/settings.xml
          echo "  xsi:schemaLocation=\"http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd\">" >> ~/.m2/settings.xml
          echo "  <servers>" >> ~/.m2/settings.xml
          echo "    <server>" >> ~/.m2/settings.xml
          echo "      <id>ossrh</id>" >> ~/.m2/settings.xml
          echo "      <username>${CENTRAL_USERNAME}</username>" >> ~/.m2/settings.xml
          echo "      <password>${CENTRAL_PASSWORD}</password>" >> ~/.m2/settings.xml
          echo "    </server>" >> ~/.m2/settings.xml
          echo "    <server>" >> ~/.m2/settings.xml
          echo "      <id>gpg.passphrase</id>" >> ~/.m2/settings.xml
          echo "      <passphrase>${GPG_PASSPHRASE}</passphrase>" >> ~/.m2/settings.xml
          echo "    </server>" >> ~/.m2/settings.xml
          echo "  </servers>" >> ~/.m2/settings.xml
          echo "</settings>" >> ~/.m2/settings.xml

      - name: Show generated Maven settings (servers)
        run: |
          echo "--- ~/.m2/settings.xml ---"
          if [ -f ~/.m2/settings.xml ]; then
            sed -n '1,200p' ~/.m2/settings.xml || true
            echo "--- grep for ossrh entries ---"
            grep -n "<id>ossrh</id>" -n ~/.m2/settings.xml || true
          else
            echo "~/.m2/settings.xml not found"
          fi

      - name: Build artifacts and install to local Maven repository
        run: |
          # Build modules and install artifacts into the local Maven repository
          # so we can assemble a correctly structured Maven layout (with .pom files)
          mvn -B -DskipTests -Dgpg.skip=true clean install

      # The install above writes artifacts and POMs into ~/.m2/repository
      # in a proper Maven layout. We will use that layout for bundling so the
      # Sonatype Central Publisher receives jars alongside their .pom files.

      - name: Sign artifacts in local Maven repository with GPG
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          REPO="${HOME}/.m2/repository/io/github/abhiramrathod"
          if [ ! -d "$REPO" ]; then
            echo "Local repository path $REPO not found"; ls -la $(dirname "$REPO") || true; exit 1
          fi
          # find jars and poms under our groupId path and sign them
          files=$(find "$REPO" -type f \( -name "*.jar" -o -name "*.pom" \) ) || true
          if [ -z "$files" ]; then
            echo "No artifacts found to sign in $REPO"; exit 1
          fi
          for f in $files; do
            echo "Signing $f"
            # create detached ASCII-armored signatures next to each artifact
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign -a "$f"
          done

      - name: Assemble deployment bundle from local Maven repository
        run: |
          set -euo pipefail
          rm -rf central-bundle.zip bundle || true
          mkdir -p bundle/io/github
          # copy the groupId tree from the local Maven repository into the bundle preserving the path
          cp -R "$HOME/.m2/repository/io/github/abhiramrathod" bundle/io/github/
          # create zip with the correct directory structure at the root of the archive
          cd bundle
          zip -r ../central-bundle.zip io
          cd ..

      - name: Upload bundle to Sonatype Central Publisher (AUTOMATIC)
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          CENTRAL_API_TOKEN: ${{ secrets.CENTRAL_API_TOKEN }}
        run: |
          set -euo pipefail
          # compute base64 user token
          token=$(printf "%s:%s" "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 -w0)
          echo "Uploading bundle (trying Basic auth)..."
          # Use HTTP Basic auth (base64 username:password) for the Publisher API
          resp=$(curl -s -w "\n%{http_code}" -H "Authorization: Basic $token" -F "bundle=@central-bundle.zip;type=application/octet-stream" "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC") || true
          http=$(printf "%s" "$resp" | tail -n1)
          body=$(printf "%s" "$resp" | sed '$d')
          echo "HTTP status: $http"
          echo "Body: $body"
          if [ "$http" = "201" ] || [ "$http" = "200" ]; then
            export DEPLOYMENT_ID=$(printf "%s" "$body" | tr -d '\r' | tail -n1)
            echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
            exit 0
          fi
          if [ "$http" = "403" ]; then
            echo "Upload returned 403 Forbidden with Basic auth. If you have a Sonatype API token, trying Bearer auth next..."
            if [ -n "${CENTRAL_API_TOKEN:-}" ]; then
              echo "Uploading bundle (trying Bearer token)..."
              resp2=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $CENTRAL_API_TOKEN" -F "bundle=@central-bundle.zip;type=application/octet-stream" "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC") || true
              http2=$(printf "%s" "$resp2" | tail -n1)
              body2=$(printf "%s" "$resp2" | sed '$d')
              echo "HTTP status: $http2"
              echo "Body: $body2"
              if [ "$http2" = "201" ] || [ "$http2" = "200" ]; then
                export DEPLOYMENT_ID=$(printf "%s" "$body2" | tr -d '\r' | tail -n1)
                echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
                exit 0
              fi
              echo "Bearer attempt failed (HTTP $http2)."
            else
              echo "No CENTRAL_API_TOKEN secret set; cannot try Bearer token fallback."
            fi
            echo "Upload failed with 403. Common causes: invalid credentials, using the wrong secret (use a Sonatype user token as password), or the account is not authorized for the groupId."
            echo "Please verify the secrets: CENTRAL_USERNAME, CENTRAL_PASSWORD (user token), or set CENTRAL_API_TOKEN for a bearer token.";
            exit 1
          fi
          echo "Upload failed (HTTP $http). Body: $body"; exit 1

      - name: Poll deployment status until published
        env:
          SONATYPE_TOKEN: ${{ secrets.CENTRAL_USERNAME }}:${{ secrets.CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail
          # compute base64 token again
          token=$(printf "%s" "${{ secrets.CENTRAL_USERNAME }}:${{ secrets.CENTRAL_PASSWORD }}" | base64 -w0)
          id="$DEPLOYMENT_ID"
          echo "Polling deployment id: $id"
          attempts=0
          max=120
          sleep_seconds=15
          # Treat 5xx as transient server-side issues; retry with backoff
          while [ $attempts -lt $max ]; do
            attempts=$((attempts+1))
            echo "Attempt $attempts"
            out=$(curl -s -w "\n%{http_code}" -H "Authorization: Basic $token" "https://central.sonatype.com/api/v1/publisher/status?id=$id") || true
            http=$(printf "%s" "$out" | tail -n1)
            body=$(printf "%s" "$out" | sed '$d')
            echo "HTTP status: $http"
            echo "Body: $body"
            if [ "$http" = "200" ]; then
              state=$(printf "%s" "$body" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("deploymentState",""))') || true
              echo "State: $state"
              if [ "$state" = "PUBLISHED" ]; then
                echo "Deployment published successfully"; exit 0
              fi
              if [ "$state" = "FAILED" ]; then
                echo "Deployment failed"; printf "%s" "$body" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("errors",""))' || true; exit 1
              fi
            elif [ "$http" = "500" ]; then
              echo "Sonatype returned 500 (server error). This is likely transient; retrying after backoff..."
              # exponential-ish backoff (capped)
              if [ $sleep_seconds -lt 120 ]; then sleep_seconds=$((sleep_seconds*2)); fi
            elif [ "$http" = "401" ] || [ "$http" = "403" ]; then
              echo "Authentication/authorization error (HTTP $http). Please verify CENTRAL_USERNAME/CENTRAL_PASSWORD and that the account is authorized for the groupId."; exit 1
            else
              echo "Unexpected HTTP status: $http; treating as retryable (will sleep and retry)."
            fi
            echo "Sleeping $sleep_seconds seconds before next attempt..."
            sleep $sleep_seconds
          done
          echo "Timed out waiting for publish after $attempts attempts"; exit 1






















