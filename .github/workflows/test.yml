name: Test

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test (JDK ${{ inputs.java-version }})
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: 'temurin'
        cache: maven
    
    - name: Run tests
      run: mvn test -B
    
    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results (JDK ${{ inputs.java-version }})
        path: '**/target/surefire-reports/TEST-*.xml'
        reporter: java-junit
        fail-on-error: false
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-jdk-${{ inputs.java-version }}
        path: '**/target/surefire-reports/'
        retention-days: 7
