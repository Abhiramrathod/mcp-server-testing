name: CI Pipeline

on:
  push:
    branches: [ master, release ]
  pull_request:
    branches: [ master, release ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

jobs:
  build-jdk17:
    name: Build JDK 17
    uses: ./.github/workflows/build.yml
    with:
      java-version: '17'
      upload-artifacts: true
  
  build-jdk21:
    name: Build JDK 21
    uses: ./.github/workflows/build.yml
    with:
      java-version: '21'
      upload-artifacts: true
  
  all-tests-jdk17:
    name: All Tests JDK 17
    needs: [ build-jdk17 ]
    uses: ./.github/workflows/all-tests.yml
    with:
      java-version: '17'
  
  all-tests-jdk21:
    name: All Tests JDK 21
    needs: [ build-jdk21 ]
    uses: ./.github/workflows/all-tests.yml
    with:
      java-version: '21'
  
  code-quality:
    name: Code Quality
    uses: ./.github/workflows/code-quality.yml
  
  publish:
    name: Publish
    needs: [ all-tests-jdk17, code-quality ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: ./.github/workflows/publish.yml
