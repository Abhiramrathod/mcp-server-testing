name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Get current version
      id: version
      run: |
        # Extract version from pom.xml
        CURRENT_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
        echo "Current version: $CURRENT_VERSION"
        echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        
        # Parse version (e.g., 1.0.0 -> major=1, minor=0, patch=0)
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
        
        # Increment patch version
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
        echo "New version: $NEW_VERSION"
        echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
    
    - name: Build and Test
      run: mvn clean verify -B
    
    - name: Update version and tag
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
      run: |
        # Update version in all POMs
        mvn versions:set -DnewVersion=${{ steps.version.outputs.new }} -DgenerateBackupPoms=false -B
        
        # Commit version changes
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add pom.xml */pom.xml
        git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
        git push
        
        # Create and push tag for JitPack (skip if exists)
        if git rev-parse "v${{ steps.version.outputs.new }}" >/dev/null 2>&1; then
          echo "Tag v${{ steps.version.outputs.new }} already exists, skipping tag creation"
        else
          git tag v${{ steps.version.outputs.new }}
          git push origin v${{ steps.version.outputs.new }}
          echo "Created and pushed tag v${{ steps.version.outputs.new }}"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-v${{ steps.version.outputs.new }}
        path: '**/target/*.jar'
        retention-days: 7
